<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Versión simplificada del logo CPS para favicon.
       Sin texto circular (ilegible a 16-32px) — solo anillo verde + monograma CPS. -->
  <circle cx="100" cy="100" r="98" fill="#2D8B3C"/>
  <circle cx="100" cy="100" r="70" fill="white"/>
  <g fill="#2D8B3C" font-family="'Playfair Display', Georgia, serif" font-weight="900">
    <text x="100" y="85" text-anchor="middle" font-size="48">P</text>
    <text x="78" y="135" text-anchor="middle" font-size="48">C</text>
    <text x="122" y="135" text-anchor="middle" font-size="48">S</text>
  </g>
</svg>
